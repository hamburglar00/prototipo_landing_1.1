    .cta-button {
      background:linear-gradient(90deg,#25d366,#128c7e);
      color:white;padding:18px 18px;border:none;border-radius:10px;
      font-size:0.95em;font-weight:700;line-height:1.25;cursor:pointer;text-decoration:none;
      display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:420px;box-sizing:border-box;margin-top:16px;animation:heartbeat 1.5s infinite;
      box-shadow:0 0 15px #25d36680;transition:transform 0.2s ease;

    .cta-button:hover {background:linear-gradient(90deg,#1ebe5d,#0c6f58);transform:scale(1.03);}

      background-color:#2a2a2a;color:white;border-radius:10px 10px 10px 0;
      padding:14px 18px;position:relative;max-width:85%;font-size:0.95em;
      animation:fadeInBubble 0.5s ease;
    }
    .testimonial::after {
      content:"";position:absolute;left:-10px;bottom:0;width:0;height:0;
      border-right:10px solid #2a2a2a;border-top:10px solid transparent;
    }
    .progress-bar {
      height:4px;background:#25d366;width:0%;border-radius:5px;
      margin-top:8px;transition:width 5s linear;
    }
    @keyframes fadeInBubble {from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  <script>
    const whatsappNumbers = [
      "5493562544439"  // ColoTest
    ];

    function safeStorageGet(key){
      try { return localStorage.getItem(key); } catch { return null; }
    }

    function safeStorageSet(key, value){
      try { localStorage.setItem(key, value); } catch {}
    }

    function randomId(prefix){
      const bytes = new Uint8Array(8);
      if (window.crypto && window.crypto.getRandomValues) {
        window.crypto.getRandomValues(bytes);
      } else {
        for (let i = 0; i < bytes.length; i++) bytes[i] = Math.floor(Math.random() * 256);
      }

      const id = Array.from(bytes, byte => byte.toString(36).padStart(2, '0')).join('').slice(0, 12);
      return `${prefix}${id}`;
    }

    function getOrCreateExternalId(){
      let externalId = safeStorageGet('external_id');
      if (!externalId) {
        externalId = randomId('x');
        safeStorageSet('external_id', externalId);
      }
      return externalId;
    }

    function getCookie(name){
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : '';
    }

    function getFbc(params){
      const cookieFbc = getCookie('_fbc');
      if (cookieFbc) {
        safeStorageSet('stored_fbc', cookieFbc);
        return cookieFbc;
      }

      const storedFbc = safeStorageGet('stored_fbc');
      if (storedFbc) return storedFbc;

      const fbclid = params.get('fbclid');
      if (!fbclid) return '';

      const fbc = `fb.1.${Date.now()}.${fbclid}`;
      safeStorageSet('stored_fbc', fbc);
      return fbc;
    }

    function getFbp(){
      const cookieFbp = getCookie('_fbp');
      if (cookieFbp) {
        safeStorageSet('stored_fbp', cookieFbp);
        return cookieFbp;
      }

      const storedFbp = safeStorageGet('stored_fbp');
      if (storedFbp) return storedFbp;

      const fbp = `fb.1.${Date.now()}.${Math.floor(Math.random() * 10000000000)}`;
      safeStorageSet('stored_fbp', fbp);
      return fbp;
    }

    function buildReferenceCode(eventId, params){
      const values = {
        c: getFbc(params),
        p: getFbp(),
        x: getOrCreateExternalId(),
        e: eventId
      };

      return Object.entries(values)
        .filter(([, value]) => Boolean(value))
        .map(([key, value]) => `${key}=${value}`)
        .join('|');
    }

    function getWhatsAppMessage(){
      const params = new URLSearchParams(window.location.search);
      const utmCampaign = params.get('utm_campaign');
      const eventId = randomId('e');
      const baseMessage = 'Hola! quiero más informacion por favor!';
      const campaignText = utmCampaign ? ` Vi el anuncio ${utmCampaign}.` : '';
      const referenceCode = buildReferenceCode(eventId, params);
      const referenceText = referenceCode ? `\n\nCodigo de referencia: ${referenceCode}` : '';

      return {
        eventId,
        text: encodeURIComponent(`${baseMessage}${campaignText} Mi nombre es:${referenceText}`)
      };
    }

    function goToWhatsApp(){
      const whatsappNumber = whatsappNumbers[Math.floor(Math.random() * whatsappNumbers.length)];
      const message = getWhatsAppMessage();
      fbq('track','Contact', {}, { eventID: message.eventId });
      window.location.href=`https://wa.me/${whatsappNumber}?text=${message.text}`;
    }

    const testimonios=[
      'Romina S.: "Pense que iban a tardar, pero me contestaron enseguida."',
      'Juan Pablo T.: "Me atendieron bien, sin vueltas. Por WhatsApp fue todo bastante simple."',
      'Susana D.: "Tenia mil dudas y me las fueron respondiendo una por una."',
      'Diego A.: "Buena onda la atencion, me respondieron rapido y claro."',
      'Camila R.: "No sabia bien que tenia que hacer y me guiaron paso a paso."',
      'Luis F.: "Me gusto que no me dejaron colgado, respondieron bastante rapido."',
      'Emilia B.: "Muy amables por WhatsApp, me explicaron todo tranqui."'
    ];
    let current=0;
    function updateTestimonio(){
      const tDiv=document.getElementById('testimonial-text');
      const pBar=document.getElementById('progress-bar');
      tDiv.innerText=testimonios[current];
      pBar.style.transition='none';
      pBar.style.width='0%';
      setTimeout(()=>{
        pBar.style.transition='width 5s linear';
        pBar.style.width='100%';
      },10);
      current=(current+1)%testimonios.length;
    }
    window.onload=()=>{
      updateTestimonio();
      setInterval(updateTestimonio,5000);
    };
  </script>
</head>
<body>
 
  <div class="container">

    <a href="javascript:void(0);" onclick="goToWhatsApp()">
      <img src="don_social_32_transparente_comprimido.avif" alt="Perfil" class="profile-pic" />
    </a>

    <div class="contact-name"> DIVERTITE AHORA MISMO</div>
    <div class="contact-desc">Envianos un mensaje tocando el boton de abajo<br />y reclama tu regalo de bienvenida</div>

    <a class="cta-button" href="javascript:void(0);" onclick="goToWhatsApp()"><span>PEDIR MI USUARIO GRATIS AHORA</span><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" /></a>

    <div class="testimonials" onclick="goToWhatsApp()">
      <div class="testimonial" id="testimonial-text"></div>
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>
